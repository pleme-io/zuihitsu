# zuihitsu — forge product config.
#
# zuihitsu ships to three mutually-exclusive targets. Only one should be
# `active: true` at a time. Flip the flag + forge re-orchestrates.

name: zuihitsu
environment: production

render_targets:
  cloudflare-pages:
    active: true                       # freescape-native, $0/mo
    type: cloudflare
    pangea: pangea/zuihitsu.rb
    freescape:
      provider: cloudflare
      profile: always-free
    apps:
      generate: "nix run .#generate"
      upload:   "nix run .#pages-deploy"
      worker:   "nix run .#worker-deploy"
      iac:      "nix run .#pangea-apply"
    endpoints:
      site: https://blog.pleme.io
      webhook: https://webhook.blog.pleme.io/webhook

  k3s-ssr:
    active: false                      # full SSR on pleme-io cluster
    type: kubernetes
    cluster: plo
    chart: chart/zuihitsu
    helmrelease: k8s-manifests/infrastructure/zuihitsu/helmrelease.yaml
    image: ghcr.io/pleme-io/zuihitsu
    apps:
      build: "nix build"
      image: "nix run .#dockerImage"
      deploy: "forge deploy zuihitsu --cluster plo"
    endpoints:
      health: https://blog.pleme.io/healthz
      site: https://blog.pleme.io

  flyio:
    active: false                      # axum SSR on Fly, ~$2-5/mo
    type: flyio
    app_name: zuihitsu
    region: gig                        # closest to Brazil
    apps:
      build: "nix run .#dockerImage"
      deploy: "fly deploy --image <docker-load result>"
    endpoints:
      site: https://zuihitsu.fly.dev

prerelease:
  frontend:
    unit_tests: true
  post_deploy:
    smoke_queries: true
    timeout_secs: 30
    retries: 3

release:
  services:
    - name: web
      type: zuihitsu
      path: .
  prerelease: true
  dashboards: false
  post_deploy: false

dirs:
  web: .
  docs_arch: docs/arch

observability:
  dashboards:
    enabled: false
