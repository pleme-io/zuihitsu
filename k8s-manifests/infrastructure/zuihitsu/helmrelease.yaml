---
# zuihitsu — Leptos SSR blog, Hashnode-backed.
# Copy into pleme-io/k8s at k8s/clusters/{cluster}/infrastructure/zuihitsu/helmrelease.yaml
# alongside a Kustomization entry in that cluster's infrastructure stack.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zuihitsu
  namespace: pleme-web
spec:
  releaseName: zuihitsu
  chart:
    spec:
      chart: zuihitsu
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: pleme-charts
        namespace: flux-system
      interval: 5m
  interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      repository: ghcr.io/pleme-io/zuihitsu
      tag: latest
      pullPolicy: Always

    replicaCount: 2

    hashnode:
      host: drzln.hashnode.dev

    config:
      logLevel: info
      siteAddr: "0.0.0.0:3000"

    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70

    ingress:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
      hosts:
        - host: blog.quero.cloud
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: zuihitsu-tls
          hosts:
            - blog.quero.cloud

    networkPolicy:
      enabled: true
      allowDns: true
      allowPrometheus: true
      prometheusNamespace: monitoring
      allowIngressFrom:
        - namespace: ingress-nginx
      allowEgressHttps: true

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

    serviceMonitor:
      enabled: false
