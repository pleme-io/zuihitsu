# zuihitsu — Leptos SSR blog.
#
# Consumes pleme-lib (library chart) for Deployment, Service, ServiceAccount,
# PDB, HPA, ServiceMonitor. Ingress + NetworkPolicy remain locally templated
# because zuihitsu's Hashnode-CIDR egress shape isn't expressible via pleme-lib
# overlay primitives (yet).

replicaCount: 2

image:
  repository: ghcr.io/pleme-io/zuihitsu
  pullPolicy: IfNotPresent
  # pleme-lib.image falls back to "latest" when tag is empty (vs zuihitsu's
  # old helper which fell back to .Chart.AppVersion). Set explicitly until
  # pleme-lib gains an appVersion-fallback. Production overrides via the
  # FluxCD HelmRelease anyway.
  tag: "0.1.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Container ports (pleme-lib's deployment renders these directly).
ports:
  - name: http
    containerPort: 3000
    protocol: TCP

# Upstream Hashnode publication host. Single source of truth — env var below
# references it, NOTES.txt displays it.
hashnode:
  host: drzln.hashnode.dev

# Environment variables (pleme-lib renders these into the deployment).
env:
  - name: RUST_LOG
    value: "info"
  - name: LEPTOS_SITE_ADDR
    value: "0.0.0.0:3000"
  - name: LEPTOS_SITE_ROOT
    value: "/static"
  - name: ZUIHITSU_HASHNODE_HOST
    value: "drzln.hashnode.dev"

# pleme-lib probe schema: one `health` block drives liveness + readiness.
# Startup probe is its own block.
health:
  type: HTTPGet
  path: /healthz
  readyPath: /readyz
  port: http
  livenessInitialDelay: 5
  livenessPeriod: 10
  livenessFailureThreshold: 3
  readinessInitialDelay: 2
  readinessPeriod: 5
  readinessFailureThreshold: 3

startupProbe:
  enabled: true
  path: /readyz
  port: http
  initialDelaySeconds: 2
  periodSeconds: 2
  failureThreshold: 20

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# pleme-lib service schema: list of ports.
service:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# pleme-lib renames podDisruptionBudget → pdb.
pdb:
  enabled: true
  minAvailable: 1

# pleme-lib renames serviceMonitor → monitoring. Disabled by default —
# axum doesn't export /metrics yet; enable once a metrics layer is added.
monitoring:
  enabled: false
  port: http
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s

# -- Ingress. Defaults to blog.quero.cloud with cert-manager TLS.
# Hand-authored — pleme-lib has no ingress named template (gap).
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: blog.quero.cloud
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: zuihitsu-tls
      hosts:
        - blog.quero.cloud

# -- NetworkPolicy. Hand-authored — pleme-lib's allowEgress shapes don't
# cover "allow 0.0.0.0/0 except RFC1918" (egress to Hashnode public API).
networkPolicy:
  enabled: true
  allowDns: true
  allowPrometheus: true
  prometheusNamespace: monitoring
  allowIngressFrom:
    - namespace: ingress-nginx
  allowEgressHttps: true

nodeSelector: {}
tolerations: []
affinity: {}

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: zuihitsu
